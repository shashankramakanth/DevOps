apiVersion: v1
kind: Pod
metadata:
  labels:
    run: secret-env-pod
  name: secret-env-pod
spec:
  containers:
  - image: nginx-alpine
    name: secret-env-pod
    env:
    - name: db-credentials
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: admin
  dnsPolicy: ClusterFirst
  restartPolicy: Always