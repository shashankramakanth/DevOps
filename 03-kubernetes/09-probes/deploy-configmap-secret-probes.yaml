apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: production-app
  template:
    metadata:
      labels:
        app: production-app
    spec:
      containers:
      - image: nginx:alpine
        name: nginx
        envFrom:
        - configMapRef:
            name: app-config1
        volumeMounts:
        - name: secrets
          mountPath: /etc/secrets
          readOnly: true
        # -------------------------------------------------
        # PROBES MUST BE HERE (Inside the container block)
        # -------------------------------------------------
        livenessProbe:
          httpGet:
            path: /
            port: 80
          timeoutSeconds: 60
        readinessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 10
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 5
          failureThreshold: 3
      # -------------------------------------------------
      volumes:
      - name: secrets
        secret:
          secretName: app-secret